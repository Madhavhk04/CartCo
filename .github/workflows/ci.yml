name: CartCo Lakehouse CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz

    - name: Install PySpark & Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyspark==3.4.1 delta-spark==2.4.0 great-expectations==0.17.23 deltalake==0.10.0 pytest==7.4.3

    - name: Run Pytest Suite
      run: |
        # Run tests and generate stdout output
        python -m pytest tests/
